<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#000000">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="SA Ventas">
<title>Segundos Afuera · Ventas</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800;900&family=Barlow:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --negro:   #080808;
  --negro3:  #181818;
  --negro4:  #212121;
  --borde:   #303030;
  --celeste: #75AADB;
  --blanco:  #FFFFFF;
  --gris:    #bbb;
  --gris2:   #606060;
  --verde:   #2ecc71;
  --rojo:    #e74c3c;
  --oro:     #f0b429;
  --violeta: #a29bfe;
}
* { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
html, body { height:100%; background:var(--negro); color:var(--blanco); font-family:'Barlow',sans-serif; overflow:hidden; }
input, select, button { font-family:'Barlow',sans-serif; }
input:focus, select:focus { outline:none; }
::-webkit-scrollbar { display:none; }
@keyframes fadeUp  { from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);} }
@keyframes slideUp { from{transform:translateY(100%);}to{transform:translateY(0);} }
@keyframes pulse   { 0%,100%{opacity:.03;}50%{opacity:.065;} }
@keyframes spin    { from{transform:rotate(0deg);}to{transform:rotate(360deg);} }

.bg-stripes {
  position:fixed; inset:-20%; z-index:0; pointer-events:none;
  background:repeating-linear-gradient(-18deg,
    transparent 0,transparent 90px,
    rgba(117,170,219,.022) 90px,rgba(117,170,219,.022) 130px,
    transparent 130px,transparent 220px,
    rgba(255,255,255,.01) 220px,rgba(255,255,255,.01) 260px,
    transparent 260px,transparent 350px);
}
.bg-sol {
  position:fixed; right:-60px; top:45%; transform:translateY(-50%);
  font-size:280px; color:rgba(240,180,41,.04); line-height:1;
  animation:pulse 5s ease-in-out infinite; font-family:serif;
  pointer-events:none; z-index:0;
}

/* HEADER */
.header {
  background:#000000;
  border-bottom:2px solid var(--borde);
  padding:10px 16px;
  display:flex; align-items:center; justify-content:space-between;
  flex-shrink:0; position:relative; z-index:10;
}

/* APP */
#app { position:relative; height:100vh; display:flex; flex-direction:column; }
.scroll-area { flex:1; overflow-y:auto; overflow-x:hidden; padding-bottom:95px; -webkit-overflow-scrolling:touch; }
.page { display:none; padding:20px 16px 0; }
.page.active { display:block; }

/* NAV */
.bottom-nav {
  position:fixed; bottom:0; left:0; right:0;
  background:#0d0d0d; border-top:2px solid var(--borde);
  display:flex; justify-content:space-around;
  padding:10px 0 calc(10px + env(safe-area-inset-bottom));
  z-index:50;
}
.nav-btn {
  display:flex; flex-direction:column; align-items:center; gap:4px;
  background:none; border:none; color:var(--gris2);
  font-size:13px; font-weight:700; letter-spacing:.3px; text-transform:uppercase;
  cursor:pointer; padding:4px 30px; transition:color .2s;
}
.nav-btn svg { width:28px; height:28px; }
.nav-btn.active { color:var(--celeste); }

/* TOAST */
.toast {
  position:fixed; top:80px; left:50%; transform:translateX(-50%);
  background:#1c1c1c; border:2px solid var(--celeste);
  color:var(--blanco); border-radius:14px; padding:13px 26px;
  font-size:17px; font-weight:600; z-index:500; white-space:nowrap;
  pointer-events:none; display:none; animation:fadeUp .2s ease;
}
.toast.show { display:block; }

/* LOADING */
.loading-screen {
  position:fixed; inset:0; background:#000; z-index:1000;
  display:flex; flex-direction:column; align-items:center; justify-content:center; gap:16px;
}
.loading-screen.hide { display:none; }
.spinner {
  width:40px; height:40px; border:3px solid var(--borde);
  border-top-color:var(--celeste); border-radius:50%;
  animation:spin .8s linear infinite;
}
.loading-text { font-family:'Barlow Condensed'; font-size:18px; color:var(--gris); letter-spacing:2px; text-transform:uppercase; }

/* PAGE HEADER */
.page-head { display:flex; align-items:center; justify-content:space-between; margin-bottom:22px; }
.page-title { font-family:'Barlow Condensed'; font-size:36px; font-weight:900; text-transform:uppercase; color:var(--blanco); line-height:1; }
.page-sub { font-size:15px; color:var(--gris); margin-top:4px; font-weight:500; }

/* BOTONES */
.btn {
  border:none; border-radius:14px; cursor:pointer;
  font-family:'Barlow Condensed'; font-weight:800;
  text-transform:uppercase; letter-spacing:.5px;
  display:inline-flex; align-items:center; justify-content:center; gap:8px;
  transition:opacity .15s;
}
.btn:active { opacity:.7; transform:scale(.98); }
.btn-primary { background:var(--celeste); color:#000; padding:14px 22px; font-size:20px; }
.btn-ghost   { background:rgba(255,255,255,.06); color:var(--blanco); border:2px solid var(--borde); padding:11px 18px; font-size:17px; }
.btn-danger  { background:rgba(231,76,60,.14); color:var(--rojo); border:2px solid rgba(231,76,60,.3); padding:11px 18px; font-size:17px; }
.btn-full    { width:100%; padding:18px; font-size:22px; border-radius:16px; }

/* TARJETAS DÍA */
.dia-resumen { display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px; margin-bottom:24px; }
.dia-card {
  background:var(--negro3); border:1px solid var(--borde);
  border-radius:16px; padding:16px 8px 14px;
  position:relative; overflow:hidden; text-align:center;
}
.dia-card::before { content:''; position:absolute; top:0; left:0; right:0; height:4px; }
.dia-card.total::before { background:var(--celeste); }
.dia-card.decl::before  { background:var(--verde); }
.dia-card.efec::before  { background:var(--oro); }
.dia-card-label { font-size:11px; color:var(--gris); text-transform:uppercase; letter-spacing:.5px; font-weight:700; margin-bottom:8px; line-height:1.3; }
.dia-card-value { font-family:'Barlow Condensed'; font-size:24px; font-weight:900; line-height:1; }
.dia-card.total .dia-card-value { color:var(--celeste); }
.dia-card.decl  .dia-card-value { color:var(--verde); }
.dia-card.efec  .dia-card-value { color:var(--oro); }

/* FILAS VENTA */
.venta-row {
  display:flex; align-items:center; gap:14px;
  padding:16px; border-radius:14px; margin-bottom:4px;
}
.venta-row:nth-child(odd)  { background:var(--negro3); }
.venta-row:nth-child(even) { background:var(--negro4); }
.venta-icon {
  width:50px; height:50px; border-radius:13px; flex-shrink:0;
  display:flex; align-items:center; justify-content:center; font-size:22px;
}
.icon-efectivo      { background:rgba(240,180,41,.18); }
.icon-tarjeta       { background:rgba(46,204,113,.18); }
.icon-transferencia { background:rgba(162,155,254,.18); }
.venta-info { flex:1; min-width:0; }
.venta-desc { font-size:18px; font-weight:700; color:var(--blanco); line-height:1.3; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.venta-meta { font-size:14px; color:var(--gris); margin-top:4px; font-weight:500; line-height:1.4; }
.venta-monto { font-family:'Barlow Condensed'; font-size:26px; font-weight:900; color:var(--verde); flex-shrink:0; }
.venta-delete {
  background:rgba(255,255,255,.05); border:1px solid var(--borde);
  color:var(--gris2); font-size:18px; cursor:pointer;
  padding:8px 10px; flex-shrink:0; border-radius:10px; line-height:1;
}
.venta-delete:active { background:rgba(231,76,60,.15); color:var(--rojo); }

.fecha-sep {
  font-size:13px; color:var(--gris); text-transform:uppercase;
  letter-spacing:.5px; font-weight:700;
  padding:18px 2px 8px; border-bottom:1px solid var(--borde); margin-bottom:10px;
}

/* MODAL */
.overlay {
  position:fixed; inset:0; z-index:300; background:rgba(0,0,0,.9);
  display:flex; align-items:flex-end;
  opacity:0; pointer-events:none; transition:opacity .25s;
}
.overlay.open { opacity:1; pointer-events:all; }
.modal {
  width:100%; background:#141414;
  border-radius:26px 26px 0 0; border-top:2px solid var(--borde);
  max-height:92vh; overflow-y:auto;
  transform:translateY(100%); transition:transform .3s cubic-bezier(.32,1,.6,1);
  padding-bottom:calc(28px + env(safe-area-inset-bottom));
}
.overlay.open .modal { transform:translateY(0); }
.modal-handle { width:44px; height:5px; background:var(--borde); border-radius:3px; margin:14px auto 0; }
.modal-header { padding:18px 22px 15px; border-bottom:2px solid var(--borde); display:flex; align-items:center; justify-content:space-between; }
.modal-title { font-family:'Barlow Condensed'; font-size:30px; font-weight:900; text-transform:uppercase; color:var(--celeste); }
.modal-body { padding:22px; display:flex; flex-direction:column; gap:20px; }

/* CAMPOS */
.field { display:flex; flex-direction:column; gap:9px; }
.field label { font-size:15px; color:var(--blanco); font-weight:700; letter-spacing:.3px; text-transform:uppercase; }
.field input, .field select {
  background:var(--negro3); border:2px solid var(--borde);
  border-radius:14px; padding:17px;
  color:var(--blanco); font-size:20px; width:100%;
  -webkit-appearance:none; appearance:none; transition:border-color .2s; font-weight:500;
}
.field input:focus, .field select:focus { border-color:var(--celeste); }
.field input::placeholder { color:var(--gris2); }
.field-row { display:flex; gap:12px; }
.field-row .field { flex:1; }

/* MÉTODO */
.metodo-group { display:flex; gap:8px; }
.metodo-btn {
  flex:1; padding:16px 4px; border-radius:14px; font-size:15px; font-weight:700;
  cursor:pointer; border:2px solid var(--borde); color:var(--gris);
  background:var(--negro3); font-family:'Barlow'; transition:all .2s; text-align:center; line-height:1.4;
}
.metodo-btn.active-efectivo     { background:rgba(240,180,41,.15); border-color:var(--oro);     color:var(--oro); }
.metodo-btn.active-tarjeta      { background:rgba(46,204,113,.15); border-color:var(--verde);   color:var(--verde); }
.metodo-btn.active-transferencia{ background:rgba(162,155,254,.15);border-color:var(--violeta); color:var(--violeta); }

/* BADGE DECLARADO */
.decl-badge { display:flex; align-items:center; gap:10px; border-radius:14px; padding:14px 18px; font-size:16px; font-weight:700; }
.decl-badge.si { background:rgba(46,204,113,.1);  color:var(--verde); border:2px solid rgba(46,204,113,.3); }
.decl-badge.no { background:rgba(240,180,41,.1);  color:var(--oro);   border:2px solid rgba(240,180,41,.3); }

/* RESUMEN */
.mes-pills { display:flex; gap:10px; overflow-x:auto; padding-bottom:6px; margin-bottom:20px; }
.mes-pill {
  flex-shrink:0; padding:11px 22px; border-radius:24px;
  font-size:16px; font-weight:700; cursor:pointer;
  border:2px solid var(--borde); color:var(--gris);
  background:none; font-family:'Barlow'; transition:all .2s;
}
.mes-pill.active { background:var(--celeste); border-color:var(--celeste); color:#000; }
.mes-totales { display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px; margin-bottom:24px; }
.mes-card {
  background:var(--negro3); border:1px solid var(--borde);
  border-radius:16px; padding:16px 8px 14px; text-align:center; position:relative; overflow:hidden;
}
.mes-card-label { font-size:11px; color:var(--gris); text-transform:uppercase; letter-spacing:.5px; font-weight:700; margin-bottom:8px; line-height:1.3; }
.mes-card-val { font-family:'Barlow Condensed'; font-size:24px; font-weight:900; line-height:1; }

/* DÍAS */
.dia-bloque { background:var(--negro3); border:1px solid var(--borde); border-radius:16px; overflow:hidden; margin-bottom:12px; }
.dia-bloque-header { display:flex; align-items:center; justify-content:space-between; padding:16px 18px; cursor:pointer; border-bottom:1px solid transparent; transition:border-color .2s; }
.dia-bloque-header.open { border-bottom-color:var(--borde); }
.dia-bloque-fecha { font-family:'Barlow Condensed'; font-size:20px; font-weight:800; color:var(--blanco); text-transform:capitalize; }
.dia-sub-nums { display:flex; gap:12px; margin-top:4px; }
.dia-bloque-decl { font-size:14px; color:var(--verde); font-weight:700; }
.dia-bloque-efec { font-size:14px; color:var(--oro);   font-weight:700; }
.dia-bloque-total { font-family:'Barlow Condensed'; font-size:24px; font-weight:900; color:var(--celeste); }
.dia-arrow { color:var(--gris2); font-size:14px; margin-left:10px; transition:transform .2s; display:inline-block; }
.dia-arrow.open { transform:rotate(180deg); }
.dia-bloque-ventas { display:none; padding:6px 16px 14px; }
.dia-bloque-ventas.open { display:block; }
.dia-mini-venta { display:flex; align-items:center; gap:12px; padding:12px 0; border-bottom:1px solid var(--borde); }
.dia-mini-venta:last-child { border-bottom:none; }
.dia-mini-icon { width:36px; height:36px; border-radius:9px; flex-shrink:0; display:flex; align-items:center; justify-content:center; font-size:17px; }
.dia-mini-info { flex:1; min-width:0; }
.dia-mini-desc { font-size:16px; font-weight:600; color:var(--blanco); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.dia-mini-meta { font-size:13px; color:var(--gris); margin-top:2px; font-weight:500; }
.dia-mini-monto { font-family:'Barlow Condensed'; font-size:20px; font-weight:900; color:var(--verde); flex-shrink:0; }

/* SYNC INDICATOR */
.sync-dot {
  width:8px; height:8px; border-radius:50%; background:var(--verde);
  display:inline-block; margin-left:8px; vertical-align:middle;
}
.sync-dot.offline { background:var(--rojo); }
.sync-dot.syncing { background:var(--oro); animation:pulse 1s ease-in-out infinite; }

.empty { text-align:center; padding:60px 20px; color:var(--gris); }
.empty-icon { font-size:54px; opacity:.22; margin-bottom:16px; }
.empty-text { font-size:18px; line-height:1.6; font-weight:500; }
</style>
</head>

const firebaseApp = initializeApp(firebaseConfig);

// ── Estado global ──

// ── Helpers ──
const fmt    = n  => '$' + Number(n||0).toLocaleString('es-AR',{minimumFractionDigits:0,maximumFractionDigits:0});
const hoy    = () => new Date().toISOString().slice(0,10);
const mesKey = iso => iso.slice(0,7);
const mesLbl = k => {
  const [y,m] = k.split('-');
  return ['Enero','Febrero','Marzo','Abril','Mayo','Junio',
          'Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'][+m-1]+' '+y;
};
const diaLbl = iso => {
  const d = new Date(iso+'T12:00:00');
  const ds = ['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];
  const ms = ['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
  return ds[d.getDay()]+' '+d.getDate()+' de '+ms[d.getMonth()];
};
const esDecl = m => m==='tarjeta' || m==='transferencia';
const M_ICON  = {efectivo:'💵',tarjeta:'💳',transferencia:'📲'};

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

function setSyncDot(state) {
  const d = document.getElementById('sync-dot');
  d.className = 'sync-dot' + (state==='ok'?'':' '+state);
}

// ── Navegación ──
window.goTo = function(tab) {
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('page-'+tab).classList.add('active');
  document.getElementById('nav-'+tab).classList.add('active');
  document.querySelector('.scroll-area').scrollTop = 0;
  if(tab==='hoy')     renderVentas();
  if(tab==='resumen') renderResumen();
};

// ── Listener en tiempo real ──
setSyncDot('syncing');
const q = query(ventasCol, orderBy('fecha','desc'));
onSnapshot(q, (snapshot) => {
  ventas = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
  setSyncDot('ok');
  document.getElementById('loading').classList.add('hide');
  renderVentas();
  if(document.getElementById('page-resumen').classList.contains('active')) renderResumen();
}, (err) => {
  setSyncDot('offline');
  document.getElementById('loading').classList.add('hide');
  toast('⚠️ Sin conexión');
});

// ── Render ventas ──
function renderVentas() {
  const hoyStr = hoy();
  const d = new Date(hoyStr+'T12:00:00');
  const ds = ['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];
  const ms = ['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
  document.getElementById('hoy-fecha').textContent = ds[d.getDay()]+', '+d.getDate()+' de '+ms[d.getMonth()]+' '+d.getFullYear();

  const vHoy = ventas.filter(v=>v.fecha===hoyStr);
  document.getElementById('hoy-total').textContent = fmt(vHoy.reduce((a,v)=>a+v.monto,0));
  document.getElementById('hoy-decl').textContent  = fmt(vHoy.filter(v=>v.declarado).reduce((a,v)=>a+v.monto,0));
  document.getElementById('hoy-efec').textContent  = fmt(vHoy.filter(v=>!v.declarado).reduce((a,v)=>a+v.monto,0));

  const list = document.getElementById('hoy-list');
  if(ventas.length===0) {
    list.innerHTML = `<div class="empty"><div class="empty-icon">🛒</div><div class="empty-text">Aún no hay ventas.<br>Tocá <strong>Agregar</strong> para empezar.</div></div>`;
    return;
  }

  const grupos = {};
  [...ventas].sort((a,b)=>b.fecha.localeCompare(a.fecha)).forEach(v=>{
    if(!grupos[v.fecha]) grupos[v.fecha]=[];
    grupos[v.fecha].push(v);
  });

  let html = '';
  Object.keys(grupos).sort().reverse().forEach(fecha => {
    const etiqueta = fecha===hoyStr ? 'Hoy — '+diaLbl(fecha) : diaLbl(fecha);
    html += `<div class="fecha-sep">${etiqueta}</div>`;
    grupos[fecha].forEach(v => {
      const declTag = v.declarado
        ? `<span style="color:var(--verde);font-weight:700;">A declarar</span>`
        : `<span style="color:var(--oro);font-weight:700;">Efectivo</span>`;
      html += `
      <div class="venta-row">
        <div class="venta-icon ${M_CLASS[v.metodo]}">${M_ICON[v.metodo]}</div>
        <div class="venta-info">
          <div class="venta-desc">${v.descripcion}</div>
          <div class="venta-meta">${M_LABEL[v.metodo]} · ${v.fecha} · ${declTag}</div>
        </div>
        <div class="venta-monto">${fmt(v.monto)}</div>
        <button class="venta-delete" onclick="window.deleteVenta('${v.id}')">✕</button>
      </div>`;
    });
  });
  list.innerHTML = html;
}

// ── Modal ──
window.openModal = function() {
  document.getElementById('mv-fecha').value  = hoy();
  document.getElementById('mv-desc').value   = '';
  document.getElementById('mv-monto').value  = '';
  metodoSeleccionado = '';
  document.querySelectorAll('.metodo-btn').forEach(b=>b.className='metodo-btn');
  document.getElementById('decl-info').style.display='none';
  document.getElementById('ov-venta').classList.add('open');
};
window.closeModal = function() { document.getElementById('ov-venta').classList.remove('open'); };

window.selectMetodo = function(m) {
  metodoSeleccionado = m;
  document.querySelectorAll('.metodo-btn').forEach(b=>b.className='metodo-btn');
  document.getElementById('mb-'+m).className='metodo-btn active-'+m;
  const info=document.getElementById('decl-info');
  const badge=document.getElementById('decl-badge');
  info.style.display='block';
  if(esDecl(m)) {
    badge.className='decl-badge si';
    document.getElementById('decl-icon').textContent=M_ICON[m];
    document.getElementById('decl-text').textContent=M_LABEL[m]+' — Se declara';
  } else {
    badge.className='decl-badge no';
    document.getElementById('decl-icon').textContent='💵';
    document.getElementById('decl-text').textContent='Efectivo — No se declara';
  }
};

window.saveVenta = async function() {
  const fecha = document.getElementById('mv-fecha').value;
  const desc  = document.getElementById('mv-desc').value.trim();
  const monto = parseFloat(document.getElementById('mv-monto').value)||0;
  if(!fecha)              { toast('⚠️ Elegí la fecha'); return; }
  if(!desc)               { toast('⚠️ Escribí una descripción'); return; }
  if(monto<=0)            { toast('⚠️ Ingresá el monto'); return; }
  if(!metodoSeleccionado) { toast('⚠️ Elegí el método de pago'); return; }
  try {
    setSyncDot('syncing');
    await addDoc(ventasCol, {
      fecha, descripcion:desc, monto,
      metodo:metodoSeleccionado, declarado:esDecl(metodoSeleccionado),
      ts: serverTimestamp()
    });
    window.closeModal();
    toast('✅ Venta registrada');
  } catch(e) { toast('❌ Error al guardar'); setSyncDot('offline'); }
};

window.deleteVenta = async function(id) {
  if(!confirm('¿Eliminar esta venta?')) return;
  try {
    await deleteDoc(doc(db,'ventas',id));
    toast('🗑 Eliminada');
  } catch(e) { toast('❌ Error al eliminar'); }
};

// ── Resumen ──
function renderResumen() {
  const meses = [...new Set(ventas.map(v=>mesKey(v.fecha)))].sort().reverse();
  if(meses.length===0) {
    document.getElementById('res-empty').style.display='block';
    document.getElementById('res-content').style.display='none';
    return;
  }
  document.getElementById('res-empty').style.display='none';
  document.getElementById('res-content').style.display='block';
  if(!mesActivo||!meses.includes(mesActivo)) mesActivo=meses[0];
  document.getElementById('mes-pills').innerHTML = meses.map(m=>
    `<button class="mes-pill ${m===mesActivo?'active':''}" onclick="window.selectMes('${m}')">${mesLbl(m)}</button>`
  ).join('');
  renderMes();
}

window.selectMes = function(m) {
  mesActivo=m;
  document.querySelectorAll('.mes-pill').forEach(b=>b.classList.toggle('active',b.textContent===mesLbl(m)));
  renderMes();
};

function renderMes() {
  const vMes  = ventas.filter(v=>mesKey(v.fecha)===mesActivo);
  const total = vMes.reduce((a,v)=>a+v.monto,0);
  const decl  = vMes.filter(v=>v.declarado).reduce((a,v)=>a+v.monto,0);
  const efec  = vMes.filter(v=>!v.declarado).reduce((a,v)=>a+v.monto,0);

  document.getElementById('mes-totales').innerHTML=[
    {l:'Total mes',v:fmt(total),c:'var(--celeste)'},
    {l:'A declarar',v:fmt(decl),c:'var(--verde)'},
    {l:'Efectivo',v:fmt(efec),c:'var(--oro)'},
  ].map(x=>`
    <div class="mes-card">
      <div style="position:absolute;top:0;left:0;right:0;height:4px;background:${x.c}"></div>
      <div class="mes-card-label">${x.l}</div>
      <div class="mes-card-val" style="color:${x.c}">${x.v}</div>
    </div>`).join('');

  const dias=[...new Set(vMes.map(v=>v.fecha))].sort().reverse();
  if(dias.length===0) {
    document.getElementById('dias-list').innerHTML='<div style="text-align:center;padding:24px;color:var(--gris);font-size:17px;">Sin ventas este mes.</div>';
    return;
  }

  document.getElementById('dias-list').innerHTML=dias.map(dia=>{
    const vDia=vMes.filter(v=>v.fecha===dia);
    const tDia=vDia.reduce((a,v)=>a+v.monto,0);
    const dDia=vDia.filter(v=>v.declarado).reduce((a,v)=>a+v.monto,0);
    const eDia=vDia.filter(v=>!v.declarado).reduce((a,v)=>a+v.monto,0);
    const open=!!diasAbiertos[dia];
    const vHTML=vDia.sort((a,b)=>b.fecha.localeCompare(a.fecha)).map(v=>`
      <div class="dia-mini-venta">
        <div class="dia-mini-icon ${M_CLASS[v.metodo]}">${M_ICON[v.metodo]}</div>
        <div class="dia-mini-info">
          <div class="dia-mini-desc">${v.descripcion}</div>
          <div class="dia-mini-meta">${M_LABEL[v.metodo]} · ${v.declarado?'<span style="color:var(--verde);font-weight:700;">A declarar</span>':'<span style="color:var(--oro);font-weight:700;">Efectivo</span>'}</div>
        </div>
        <div class="dia-mini-monto">${fmt(v.monto)}</div>
      </div>`).join('');
    return `
    <div class="dia-bloque">
      <div class="dia-bloque-header ${open?'open':''}" onclick="window.toggleDia('${dia}')">
        <div>
          <div class="dia-bloque-fecha">${diaLbl(dia)}</div>
          <div class="dia-sub-nums">
            <span class="dia-bloque-decl">✓ ${fmt(dDia)}</span>
            <span class="dia-bloque-efec">💵 ${fmt(eDia)}</span>
          </div>
        </div>
        <div style="display:flex;align-items:center;">
          <div class="dia-bloque-total">${fmt(tDia)}</div>
          <div class="dia-arrow ${open?'open':''}">▼</div>
        </div>
      </div>
      <div class="dia-bloque-ventas ${open?'open':''}">${vHTML}</div>
    </div>`;
  }).join('');
}

window.toggleDia = function(dia) {
  diasAbiertos[dia]=!diasAbiertos[dia];
  renderMes();
};

document.getElementById('ov-venta').addEventListener('click', e=>{
  if(e.target===document.getElementById('ov-venta')) window.closeModal();
});
</script>
</body>
</html>
